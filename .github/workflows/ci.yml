name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: pollsystem_test
          POSTGRES_USER: polluser
          POSTGRES_PASSWORD: pollpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint
        run: |
          flake8 . --max-line-length=120 --exclude=migrations

      - name: Run tests
        env:
          DEBUG: True
          SECRET_KEY: ci-secret-key
          DATABASE_NAME: pollsystem_test
          DATABASE_USER: polluser
          DATABASE_PASSWORD: pollpassword
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          REDIS_URL: redis://localhost:6379/1
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          pytest --cov=polls --cov=accounts --cov=analytics --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
